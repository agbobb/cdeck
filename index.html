<meta charset="utf-8">
<title>c-deck</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data:; font-src *">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --bg:#ffffff; --panel:#f7f8fa; --panel-2:#eef1f5;
    --border:#e4e7ec; --border-2:#d8dce3;
    --text:#1d2127; --dim:#6b7280; --muted:#aeb4bd;
    --accent:#3b6fe0; --accent-dim:#e7eefc; --accent-text:#26467f;
    --sel:#e7eefc; --hover:#eef1f5;
    --danger:#d64550; --danger-bg:#fdecee; --star:#e0a52e;
    --mono:'SF Mono',ui-monospace,'Cascadia Code',Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:var(--sans); font-size:15px;
    display:flex; flex-direction:column; overflow:hidden;
  }
  button{font-family:inherit;color:inherit;cursor:pointer}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#cfd4dc;border-radius:5px}
  ::-webkit-scrollbar-track{background:transparent}

  /* ---- Top bar ---- */
  header{
    display:flex; align-items:center; gap:14px;
    padding:0 0 0 18px; height:56px; flex:0 0 auto;
    background:var(--accent); border-bottom:1px solid #2f5bc0; color:#fff;
    -webkit-app-region:drag;   /* whole bar drags the frameless window */
  }
  .logo{font-weight:600; letter-spacing:.2px; font-size:16px; color:#fff}
  .logo b{color:#cfe0ff}
  .folder-name{color:#dbe7ff; font-family:var(--mono); font-size:12.5px; text-decoration:none;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:40vw; cursor:pointer;
    -webkit-app-region:no-drag}
  .folder-name:hover{color:#fff; text-decoration:underline}
  header .spacer{flex:1}
  /* ---- Custom window controls ---- */
  .win-controls{display:flex; align-items:stretch; height:100%; -webkit-app-region:no-drag}
  .win-btn{
    width:46px; height:100%; border:none; background:transparent; color:#dbe7ff;
    display:flex; align-items:center; justify-content:center; padding:0;
    transition:background .12s, color .12s;
  }
  .win-btn svg{width:11px; height:11px}
  .win-btn:hover{background:rgba(255,255,255,.14); color:#fff}
  .win-btn.close:hover{background:#e11d2e; color:#fff}
  .btn{
    background:var(--panel-2); border:1px solid var(--border-2);
    padding:8px 14px; border-radius:8px; font-size:13.5px; color:var(--text);
    transition:background .12s;
  }
  .btn:hover{background:var(--hover)}
  .btn.primary{background:var(--accent-dim); border-color:#b9cbf5; color:var(--accent-text)}
  .btn.primary:hover{background:#d8e3fb}

  /* ---- Main split ---- */
  main{flex:1; display:flex; min-height:0}
  aside{
    width:310px; flex:0 0 auto; background:var(--panel);
    border-right:1px solid var(--border); display:flex; flex-direction:column; min-height:0;
  }
  .tabs{display:flex; padding:10px 10px 0; gap:3px}
  .tab{
    flex:1; text-align:center; padding:10px 4px; font-size:14px; font-weight:500; border-radius:8px 8px 0 0;
    color:var(--dim); border:1px solid transparent; border-bottom:none; background:transparent;
  }
  .tab:hover{color:var(--text); background:var(--hover)}
  .tab.active{color:var(--accent); background:var(--panel-2); border-color:var(--border)}
  .toolbar{
    display:flex; align-items:center; gap:8px; padding:10px; border-bottom:1px solid var(--border);
    background:var(--panel-2);
  }
  .toolbar .btn{padding:7px 10px; font-size:13px; flex:1}
  .list{flex:1; overflow:auto; padding:8px}
  .empty{color:var(--muted); font-size:14px; padding:26px 16px; text-align:center; line-height:1.7}

  /* ---- Tree / list rows ---- */
  .row{
    display:flex; align-items:center; gap:8px; padding:7px 8px; border-radius:7px;
    cursor:pointer; user-select:none; white-space:nowrap; font-size:14px;
  }
  .row:hover{background:var(--hover)}
  .row.active{background:var(--sel); color:var(--accent-text)}
  .row .ico{width:16px; text-align:center; color:var(--dim); flex:0 0 auto; font-size:13px}
  .row.folder .ico{color:var(--accent)}
  .row .name{overflow:hidden; text-overflow:ellipsis; flex:1}
  .row .chev{width:13px; flex:0 0 auto; color:var(--muted); transition:transform .12s; font-size:10px}
  .row.collapsed .chev{transform:rotate(-90deg)}
  .row .rowbtn{
    opacity:0; flex:0 0 auto; background:none; border:none; color:var(--dim);
    padding:0 4px; font-size:14px; border-radius:5px; line-height:1.4;
  }
  .row:hover .rowbtn{opacity:.75}
  .row .rowbtn:hover{color:var(--text); background:var(--border-2); opacity:1}
  .row .rowbtn.del:hover{color:var(--danger)}
  .row .rowbtn.star.on{opacity:1; color:var(--star)}
  .row.confirm{background:var(--danger-bg)}
  .row.confirm .name{color:var(--danger)}
  .row .rowbtn.ok{opacity:1; color:var(--danger)}
  .rowinput{
    flex:1; min-width:0; background:var(--bg); border:1px solid var(--accent);
    color:var(--text); border-radius:5px; padding:4px 7px; outline:none;
    font-family:inherit; font-size:14px;
  }
  .sortsel{
    background:var(--panel-2); border:1px solid var(--border-2); color:var(--dim);
    border-radius:7px; padding:6px 7px; font-size:12.5px; font-family:inherit; cursor:pointer;
  }
  .badge{color:var(--muted); font-size:11px; margin-left:auto; font-family:var(--mono)}

  /* ---- Editor ---- */
  section.editor{flex:1; display:flex; flex-direction:column; min-height:0; background:var(--bg)}
  .ed-head{
    display:flex; align-items:center; gap:12px; padding:0 20px; height:56px;
    border-bottom:1px solid var(--border); flex:0 0 auto;
  }
  .ed-title{font-family:var(--mono); font-size:13.5px; color:var(--dim);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1}
  .ed-title b{color:var(--text); font-size:15px}
  .ed-title .title-edit{cursor:pointer; border-radius:5px; padding:2px 5px; margin:-2px -5px}
  .ed-title .title-edit:hover{background:var(--hover); text-decoration:underline}
  .ed-title .title-sec{color:var(--dim); margin-left:8px}
  .title-input{
    font-family:var(--mono); font-size:15px; font-weight:700; color:var(--text);
    background:var(--bg); border:1px solid var(--accent); border-radius:6px;
    padding:4px 9px; outline:none; min-width:240px; max-width:60%;
  }
  .ed-status{font-size:12.5px; color:var(--muted); font-family:var(--mono)}
  .ed-status.saved{color:#2e9e5b}
  .ed-body{flex:1; display:flex; min-height:0}
  textarea{
    flex:1; resize:none; border:none; outline:none; background:var(--bg); color:var(--text);
    font-family:var(--mono); font-size:15px; line-height:1.7; padding:24px 28px;
    tab-size:2; width:100%;
  }

  .placeholder{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--dim); gap:18px; text-align:center; padding:24px; font-size:15px;
  }
  .placeholder .big{font-size:44px; opacity:.35; color:var(--accent)}
  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    background:var(--text); border:1px solid var(--text); color:var(--bg);
    padding:10px 18px; border-radius:10px; font-size:13.5px; opacity:0; pointer-events:none;
    transition:opacity .2s, transform .2s; box-shadow:0 6px 24px rgba(0,0,0,.18);
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-4px)}
</style>

<header>
  <div class="logo"><b>◆</b> c-deck</div>
  <a class="folder-name" id="folderName" title="Open this folder in Explorer">…</a>
  <div class="spacer"></div>
  <div class="win-controls">
    <button class="win-btn" id="winMin" title="Minimize" aria-label="Minimize">
      <svg viewBox="0 0 10 10"><path d="M0 5 h10" stroke="currentColor" stroke-width="1.2"/></svg>
    </button>
    <button class="win-btn" id="winMax" title="Maximize" aria-label="Maximize">
      <svg viewBox="0 0 10 10"><rect x="0.6" y="0.6" width="8.8" height="8.8" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
    </button>
    <button class="win-btn close" id="winClose" title="Close" aria-label="Close">
      <svg viewBox="0 0 10 10"><path d="M0 0 L10 10 M10 0 L0 10" stroke="currentColor" stroke-width="1.2"/></svg>
    </button>
  </div>
</header>

<main>
  <aside>
    <div class="tabs">
      <button class="tab active" data-tab="daily">Daily</button>
      <button class="tab" data-tab="context">Context</button>
      <button class="tab" data-tab="prompts">Prompts</button>
    </div>
    <div class="toolbar" id="toolbar"></div>
    <div class="list" id="list"></div>
  </aside>

  <section class="editor">
    <div class="ed-head" id="edHead" style="display:none">
      <div class="ed-title" id="edTitle"></div>
      <span class="ed-status" id="edStatus"></span>
      <button class="btn" id="copyPathBtn" title="Copy the full file path (for ComfyUI, etc.)">Copy path</button>
      <button class="btn" id="copyBtn">Copy</button>
    </div>
    <div class="ed-body" id="edBody">
      <div class="placeholder" id="placeholder">
        <div class="big">◆</div>
        <div id="phText">Select a file, or create a new one.</div>
      </div>
    </div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script>
/* ================= Context Deck (Electron renderer) =================
   All file I/O goes through window.api (see preload.js), scoped to the
   app's data\ folder: data\context, data\daily, data\prompts.
   Item identity = posix-style relative path, e.g. "daily/2026-07-10.md". */

const api=window.deckApi;
const $=id=>document.getElementById(id);
const listEl=$('list'), toolbarEl=$('toolbar');

/* ---------------- Window controls (frameless) ---------------- */
$('winMin').onclick   = ()=>api.winMinimize();
$('winMax').onclick   = ()=>api.winMaximize();
$('winClose').onclick = ()=>api.winClose();

/* ---------------- State ---------------- */
let tab='daily';
let cur=null;                  // {path, name, untitled}
let dirty=false, saveTimer=null;
const expanded=new Set(JSON.parse(localStorage.getItem('ctx_expanded')||'[]'));
let meta={favorites:{}};       // persisted in data\.contextdeck.json
const sortMode={daily:'recent',prompts:'fav'};
let creating=null;             // {type:'folder', parentPath}
let renaming=null;             // path being renamed
let confirmDel=null;           // path awaiting delete confirm
let dataPathStr='';            // absolute path to data\ (for breadcrumb)

/* ---------------- Toast ---------------- */
let toastT;
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1600);}

/* ---------------- Meta (favorites) ---------------- */
async function loadMeta(){
  meta={favorites:{}};
  try{const txt=await api.read('.contextdeck.json');
    if(txt){const m=JSON.parse(txt);meta=m;meta.favorites=m.favorites||{};}}
  catch{/* none yet */}
}
let metaTimer;
function saveMeta(){
  clearTimeout(metaTimer);
  metaTimer=setTimeout(()=>api.write('.contextdeck.json',JSON.stringify(meta,null,2)),200);
}
function isFav(path){return !!meta.favorites[path];}
function toggleFav(path){
  if(meta.favorites[path])delete meta.favorites[path];else meta.favorites[path]=true;
  saveMeta();render();
}

/* ---------------- Breadcrumb ---------------- */
function updateBreadcrumb(){
  const fn=$('folderName');
  const sep=dataPathStr.includes('\\')?'\\':'/';  // Windows vs macOS/Linux
  const segs=dataPathStr.split(/[\\/]/).filter(Boolean);
  const tail=segs.slice(-2).join(sep);            // e.g. context-deck\data
  fn.textContent=(tail?tail+sep:'')+tab;          // context-deck\data\daily
  fn.onclick=()=>api.reveal(tab);                 // open data/<tab> in Finder/Explorer
}

/* ---------------- Directory reading ---------------- */
async function readDir(rel){
  const entries=await api.list(rel);
  const dirs=[],files=[];
  for(const e of entries){
    if(e.name.startsWith('.'))continue;
    if(e.dir)dirs.push(e.name);
    else if(e.name.toLowerCase().endsWith('.md'))files.push(e.name);
  }
  dirs.sort((a,b)=>a.localeCompare(b));
  files.sort((a,b)=>a.localeCompare(b));
  return {dirs,files};
}
const fileExists=rel=>api.exists(rel);

/* ---------------- Rendering ---------------- */
function saveExpanded(){localStorage.setItem('ctx_expanded',JSON.stringify([...expanded]));}

function row({icon,name,cls='',active,onClick,onDel,onRename,onFav,faved,badge,chev,collapsed,indent=0}){
  const r=document.createElement('div');
  r.className='row '+cls+(active?' active':'')+(collapsed?' collapsed':'');
  r.style.paddingLeft=(6+indent*14)+'px';
  if(chev){const c=document.createElement('span');c.className='chev';c.textContent='▾';r.appendChild(c);}
  const i=document.createElement('span');i.className='ico';i.textContent=icon;r.appendChild(i);
  const n=document.createElement('span');n.className='name';n.textContent=name;r.appendChild(n);
  if(badge!=null){const b=document.createElement('span');b.className='badge';b.textContent=badge;r.appendChild(b);}
  if(onFav){const b=document.createElement('button');b.className='rowbtn star'+(faved?' on':'');
    b.textContent=faved?'★':'☆';b.title='Favorite';
    b.onclick=e=>{e.stopPropagation();onFav();};r.appendChild(b);}
  if(onRename){const b=document.createElement('button');b.className='rowbtn';b.textContent='✎';b.title='Rename';
    b.onclick=e=>{e.stopPropagation();onRename();};r.appendChild(b);}
  if(onDel){const b=document.createElement('button');b.className='rowbtn del';b.textContent='×';b.title='Delete';
    b.onclick=e=>{e.stopPropagation();onDel();};r.appendChild(b);}
  r.onclick=onClick;
  return r;
}

async function render(){
  updateBreadcrumb();
  toolbarEl.innerHTML='';
  if(tab==='context'){
    addToolBtn('+ New note',()=>createFile('context'));
    addToolBtn('+ Folder',()=>createFolder('context'));
  }else if(tab==='daily'){
    addToolBtn('Go to today',openToday);
  }else{
    addToolBtn('+ New prompt',()=>createFile('prompts'));
  }
  if(tab!=='context')addSortSel(tab);
  listEl.innerHTML='';
  try{
    if(tab==='context')      await renderTree('context',0);
    else if(tab==='daily')   await renderFlat('daily',true);
    else                     await renderFlat('prompts',false);
  }catch(e){console.error(e);showEmpty('Could not read the data folder.');}
}
function addToolBtn(label,fn){const b=document.createElement('button');
  b.className='btn';b.textContent=label;b.onclick=fn;toolbarEl.appendChild(b);}
function addSortSel(key){
  const s=document.createElement('select');s.className='sortsel';s.title='Sort';
  for(const[v,l] of [['fav','★ Favorites'],['recent','Recent'],['name','Name']]){
    const o=document.createElement('option');o.value=v;o.textContent=l;
    if(sortMode[key]===v)o.selected=true;s.appendChild(o);}
  s.onchange=()=>{sortMode[key]=s.value;render();};
  toolbarEl.appendChild(s);
}
function showEmpty(html){const d=document.createElement('div');d.className='empty';d.innerHTML=html;listEl.appendChild(d);}

/* inline name input (no browser dialogs) */
function makeInput({icon,indent=0,value='',placeholder=''},onCommit){
  const r=document.createElement('div');r.className='row';r.style.paddingLeft=(6+indent*14)+'px';
  const i=document.createElement('span');i.className='ico';i.textContent=icon;r.appendChild(i);
  const inp=document.createElement('input');inp.className='rowinput';inp.value=value;inp.placeholder=placeholder;
  r.appendChild(inp);
  let done=false;
  const finish=commit=>{if(done)return;done=true;const v=inp.value.trim();
    if(commit&&v)onCommit(v);else render();};
  inp.addEventListener('keydown',e=>{e.stopPropagation();
    if(e.key==='Enter'){e.preventDefault();finish(true);}
    else if(e.key==='Escape'){e.preventDefault();finish(false);}});
  inp.addEventListener('blur',()=>finish(true));
  requestAnimationFrame(()=>{inp.focus();inp.select();});
  return r;
}
function makeConfirm({icon,indent=0,name},onYes){
  const r=document.createElement('div');r.className='row confirm';r.style.paddingLeft=(6+indent*14)+'px';
  const i=document.createElement('span');i.className='ico';i.textContent=icon;r.appendChild(i);
  const n=document.createElement('span');n.className='name';n.textContent='Delete “'+name+'”?';r.appendChild(n);
  const ok=document.createElement('button');ok.className='rowbtn ok';ok.textContent='✓';ok.title='Confirm';
  ok.onclick=e=>{e.stopPropagation();onYes();};r.appendChild(ok);
  const no=document.createElement('button');no.className='rowbtn';no.textContent='✕';no.style.opacity=1;no.title='Cancel';
  no.onclick=e=>{e.stopPropagation();confirmDel=null;render();};r.appendChild(no);
  return r;
}

async function renderTree(rel,indent){
  const {dirs,files}=await readDir(rel);
  if(indent===0 && creating && creating.parentPath==='context')
    listEl.appendChild(makeInput({icon:'▸',indent:0,placeholder:'folder name'},commitCreate));
  if(indent===0 && !dirs.length && !files.length && !creating){
    showEmpty('No context files yet.<br>Create one with <b>+ New note</b>.');return;}
  for(const d of dirs){
    const p=rel+'/'+d, isOpen=expanded.has(p);
    if(renaming===p)listEl.appendChild(makeInput({icon:'▸',indent,value:d},v=>commitRename(p,true,v)));
    else if(confirmDel===p)listEl.appendChild(makeConfirm({icon:'▸',indent,name:d},()=>doDelete(p,true)));
    else{listEl.appendChild(row({icon:'▸',name:d,cls:'folder',chev:true,collapsed:!isOpen,indent,
      onClick:()=>{isOpen?expanded.delete(p):expanded.add(p);saveExpanded();render();},
      onRename:()=>{renaming=p;render();},
      onDel:()=>{confirmDel=p;render();}}));
      if(isOpen)await renderTree(p,indent+1);}
  }
  for(const f of files){
    const p=rel+'/'+f, disp=f.replace(/\.md$/,'');
    if(renaming===p)listEl.appendChild(makeInput({icon:'≡',indent,value:disp},v=>commitRename(p,false,v)));
    else if(confirmDel===p)listEl.appendChild(makeConfirm({icon:'≡',indent,name:disp},()=>doDelete(p,false)));
    else listEl.appendChild(row({icon:'≡',name:disp,indent,active:cur&&cur.path===p,
      onClick:()=>openFile(p),
      onRename:()=>{renaming=p;render();},
      onDel:()=>{confirmDel=p;render();}}));
  }
}
async function renderFlat(rel,dated){
  const {files}=await readDir(rel);
  const items=await Promise.all(files.map(async f=>{
    const p=rel+'/'+f; let mtime=0;
    try{mtime=(await api.stat(p)).mtimeMs;}catch{}
    return {name:f,p,mtime,fav:isFav(p)};
  }));
  const mode=sortMode[rel];
  items.sort((a,b)=>{
    if(mode==='fav' && a.fav!==b.fav)return a.fav?-1:1;
    if(mode==='name')return a.name.localeCompare(b.name);
    return b.mtime-a.mtime;                       // recent (and tiebreak within favorites)
  });
  const icon=dated?'❑':'✦';
  if(!items.length && !creating){
    showEmpty(dated?'No daily entries.<br>Start one with <b>Go to today</b>.':'No prompts.<br>Add one with <b>+ New prompt</b>.');return;}
  for(const f of items){
    const disp=f.name.replace(/\.md$/,'');
    if(renaming===f.p){listEl.appendChild(makeInput({icon,value:disp},v=>commitRename(f.p,false,v)));continue;}
    if(confirmDel===f.p){listEl.appendChild(makeConfirm({icon,name:disp},()=>doDelete(f.p,false)));continue;}
    listEl.appendChild(row({icon,name:disp,active:cur&&cur.path===f.p,faved:f.fav,
      onFav:()=>toggleFav(f.p),
      onClick:()=>openFile(f.p),
      onRename:()=>{renaming=f.p;render();},
      onDel:()=>{confirmDel=f.p;render();}}));
  }
}

/* ---------------- File ops ---------------- */
function sanitize(name){return name.replace(/[\\/:*?"<>|]/g,'').trim();}

async function createFile(section){           // instant untitled note, ready to type
  let name='untitled.md', n=1;
  while(await fileExists(section+'/'+name)){n++;name='untitled-'+n+'.md';}
  try{
    await api.write(section+'/'+name,'');
    await render();
    openFile(section+'/'+name,{untitled:true,cursorStart:true});
  }catch(e){console.error(e);toast('Could not create note');}
}
function createFolder(section){creating={type:'folder',parentPath:section};render();}
async function commitCreate(v){
  const c=creating; creating=null;
  const name=sanitize(v); if(!name){render();return;}
  try{await api.mkdir(c.parentPath+'/'+name);expanded.add(c.parentPath+'/'+name);saveExpanded();}
  catch(e){console.error(e);toast('Could not create folder');}
  render();
}
function pad(n){return String(n).padStart(2,'0');}
function todayName(){const d=new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}.md`;}
async function ensureToday(){                  // start a fresh daily note each day
  const name=todayName();
  if(!await fileExists('daily/'+name)){
    const head=new Date().toLocaleDateString(undefined,{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    await api.write('daily/'+name,'# '+head+'\n\n');
  }
  return name;
}
async function openToday(){
  const name=await ensureToday();
  await render();openFile('daily/'+name);
}
async function doDelete(path,isDir){
  confirmDel=null;
  try{await api.remove(path,isDir);
    if(meta.favorites[path]){delete meta.favorites[path];saveMeta();}
    if(cur&&cur.path===path)closeEditor();
    toast('Deleted');render();
  }catch(e){console.error(e);toast('Could not delete');render();}
}
// Rename a file/folder. If it's the file currently open, keep it open (just
// update cur) instead of closing the editor. Returns the new path.
async function performRename(oldPath,isFolder,rawName){
  let name=sanitize(rawName); if(!name)return oldPath;
  if(!isFolder && !name.toLowerCase().endsWith('.md'))name+='.md';
  const oldName=oldPath.split('/').pop();
  if(name===oldName)return oldPath;
  if(cur&&cur.path===oldPath&&dirty){clearTimeout(saveTimer);await flushSave();}
  const newPath=await api.rename(oldPath,name);
  if(meta.favorites[oldPath]){delete meta.favorites[oldPath];meta.favorites[newPath]=true;saveMeta();}
  if(cur&&cur.path===oldPath){cur.path=newPath;cur.name=name;cur.untitled=false;}
  return newPath;
}
async function commitRename(oldPath,isFolder,v){
  renaming=null;
  if(!sanitize(v)){render();return;}
  try{
    await performRename(oldPath,isFolder,v);
    if(isFolder && cur && cur.path.startsWith(oldPath+'/'))closeEditor(); // open file moved with folder
    else if(cur)setTitle(cur.name,cur.path);
    toast('Renamed');render();
  }catch(e){console.error(e);toast('Could not rename (name in use?)');render();}
}

/* ---------------- Editor ---------------- */
const ta=document.createElement('textarea');
ta.spellcheck=false; ta.placeholder='Start typing…';

async function openFile(path,opts={}){
  if(dirty)await flushSave();
  const text=await api.read(path);
  cur={path,name:path.split('/').pop(),untitled:!!opts.untitled};
  ta.value=text;
  const body=$('edBody');
  if(ta.parentElement!==body){body.innerHTML='';body.appendChild(ta);}
  $('edHead').style.display='flex';
  setTitle(cur.name,path);
  setStatus('saved','saved');
  render();
  ta.focus();
  if(opts.cursorStart)ta.setSelectionRange(0,0);
}
function setTitle(name,path){
  const t=$('edTitle');t.innerHTML='';
  const b=document.createElement('b');b.className='title-edit';
  b.textContent=name.replace(/\.md$/,'');b.title='Click to rename';
  b.onclick=startTitleEdit;
  const s=document.createElement('span');s.className='title-sec';s.textContent=' '+path.split('/')[0];
  t.appendChild(b);t.appendChild(s);
}
function startTitleEdit(){
  if(!cur)return;
  cur.untitled=false;                 // manual title wins over auto-title
  const t=$('edTitle');t.innerHTML='';
  const inp=document.createElement('input');inp.className='title-input';
  inp.value=cur.name.replace(/\.md$/,'');
  t.appendChild(inp);
  let done=false;
  const finish=async commit=>{
    if(done)return;done=true;
    const v=inp.value.trim();
    if(commit && v && v!==cur.name.replace(/\.md$/,'')){
      try{await performRename(cur.path,false,v);toast('Renamed');render();}
      catch(e){console.error(e);toast('Could not rename (name in use?)');}
    }
    setTitle(cur.name,cur.path);
  };
  inp.addEventListener('keydown',e=>{e.stopPropagation();
    if(e.key==='Enter'){e.preventDefault();finish(true);}
    else if(e.key==='Escape'){e.preventDefault();finish(false);}});
  inp.addEventListener('blur',()=>finish(true));
  requestAnimationFrame(()=>{inp.focus();inp.select();});
}
function closeEditor(){
  cur=null;dirty=false;$('edHead').style.display='none';
  const body=$('edBody');body.innerHTML='';body.appendChild($('placeholder'));
}
function setStatus(text,cls){const s=$('edStatus');s.textContent=text;s.className='ed-status '+(cls||'');}

ta.addEventListener('input',()=>{
  dirty=true;setStatus('editing…','');
  clearTimeout(saveTimer);saveTimer=setTimeout(flushSave,700);
});
/* Paste: reconstruct paragraph breaks from the HTML flavor (plain text from
   Claude collapses the blank lines between paragraphs). */
ta.addEventListener('paste',e=>{
  const cd=e.clipboardData; if(!cd)return;
  const html=cd.getData('text/html');
  const plain=cd.getData('text/plain');
  let text=plain;
  const plainHasBlankLines=/\n[ \t]*\n/.test(plain||'');
  if(html && /<(p|div|br|h[1-6]|li|blockquote)\b/i.test(html) && !plainHasBlankLines){
    text=htmlToText(html);
  }
  if(text==null)return;
  e.preventDefault();
  const s=ta.selectionStart, en=ta.selectionEnd;
  ta.value=ta.value.slice(0,s)+text+ta.value.slice(en);
  const pos=s+text.length; ta.setSelectionRange(pos,pos);
  ta.dispatchEvent(new Event('input'));   // mark dirty + autosave
});
function htmlToText(html){
  const div=document.createElement('div');div.innerHTML=html;
  let out='';
  (function walk(node){
    for(const n of node.childNodes){
      if(n.nodeType===3){out+=n.nodeValue.replace(/\s+/g,' ');}
      else if(n.nodeType===1){
        const tag=n.tagName;
        if(tag==='BR'){out+='\n';continue;}
        if(tag==='LI'){if(out&&!out.endsWith('\n'))out+='\n';out+='- ';walk(n);out+='\n';continue;}
        const block=/^(P|DIV|H[1-6]|BLOCKQUOTE|PRE|UL|OL|TABLE|TR|SECTION|ARTICLE)$/.test(tag);
        if(block && out && !/\n\n$/.test(out))out+=out.endsWith('\n')?'\n':'\n\n';
        walk(n);
        if(block)out+='\n\n';
      }
    }
  })(div);
  return out.replace(/[ \t]+\n/g,'\n').replace(/\n{3,}/g,'\n\n').replace(/[ \t]{2,}/g,' ').trim();
}
ta.addEventListener('blur',async()=>{await flushSave();await maybeAutoTitle();});
async function flushSave(){
  if(!cur||!dirty)return;
  clearTimeout(saveTimer);
  try{await api.write(cur.path,ta.value);dirty=false;setStatus('saved','saved');}
  catch(e){console.error(e);setStatus('save failed','');toast('Save failed');}
}
/* auto-name an untitled note from its first line */
async function maybeAutoTitle(){
  if(!cur||!cur.untitled)return;
  const first=ta.value.split('\n').map(s=>s.trim()).find(s=>s.length);
  if(!first)return;
  let title=sanitize(first.replace(/^#+\s*/,'')).slice(0,60);
  if(!title){cur.untitled=false;return;}
  const section=cur.path.split('/')[0];
  let name=title+'.md', n=1;
  while(name!==cur.name && await fileExists(section+'/'+name)){n++;name=title+'-'+n+'.md';}
  cur.untitled=false;
  if(name===cur.name)return;
  try{
    const newPath=await api.rename(cur.path,name);
    if(meta.favorites[cur.path]){delete meta.favorites[cur.path];meta.favorites[newPath]=true;saveMeta();}
    cur.path=newPath;cur.name=name;setTitle(name,newPath);render();
  }catch(e){console.warn('auto-title failed',e);}
}

$('copyBtn').onclick=async()=>{
  if(!cur)return;
  try{await navigator.clipboard.writeText(ta.value);toast('Copied to clipboard');}
  catch{toast('Copy failed');}
};
$('copyPathBtn').onclick=async()=>{
  if(!cur)return;
  try{const p=await api.abspath(cur.path);await navigator.clipboard.writeText(p);toast('Path copied');}
  catch{toast('Copy failed');}
};

/* Ctrl+S / Ctrl+N */
window.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();flushSave().then(()=>toast('Saved'));}
  if((e.ctrlKey||e.metaKey)&&e.key==='n'){e.preventDefault();
    if(tab==='context')createFile('context');
    else if(tab==='daily')openToday();
    else createFile('prompts');}
});
window.addEventListener('beforeunload',()=>{if(dirty)api.write(cur.path,ta.value);});

/* ---------------- Tabs ---------------- */
function setActiveTab(name){document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab===name));}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{setActiveTab(t.dataset.tab);tab=t.dataset.tab;render();});

/* ---------------- Boot ---------------- */
(async function boot(){
 try{
  if(!api){$('phText').innerHTML='Not running inside the app.<br>Launch with <b>start.bat</b>.';return;}
  dataPathStr=await api.dataPath();
  await loadMeta();
  try{await ensureToday();}catch(e){console.warn('ensureToday failed',e);}
  tab='daily';setActiveTab('daily');
  await render();
  try{await openToday();}catch(e){console.warn(e);closeEditor();}
 }catch(err){console.error('boot failed',err);}
})();
</script>
